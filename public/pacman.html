<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팩맨 퀴즈 어드벤처</title>
<script type="text/javascript" nonce="XOJ0BVE+zr3qdJZKBBAaLFbFzesxhK/xP1QmLnOdycs=" src="//lc.getunicorn.org?type=base-script&amp;request-id=5939"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ─ 디자인 시스템 ─ */
:root {
  --gold:#f5c842; --teal:#2dd4bf; --red:#f43f5e;
  --green:#4ade80; --purple:#a78bfa; --blue:#60a5fa;
  --panel:#111827; --surface:#1a2236; --raised:#212d42; --hover:#2a3a54;
  --txt:#e8eef8; --muted:#4a6080; --subdued:#8fa3c0;
  --border:rgba(255,255,255,.10);
  --r-sm:4px; --r-md:8px; --r-lg:14px; --r-xl:20px;
  --fp:'Press Start 2P',monospace; --fu:'Noto Sans KR',sans-serif;
  --fs-base:15px; --fs-sm:13px; --fs-xs:11px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--fu);color:var(--txt)}

/* ─ 화면 전환 ─ */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;transition:opacity .3s,transform .3s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97)}

/* ─ 로그인 ─ */
.login-card{background:var(--panel);border:1px solid rgba(245,200,66,.35);border-radius:var(--r-xl);padding:40px 44px 36px;width:480px;position:relative;box-shadow:0 0 0 1px rgba(245,200,66,.08),0 24px 80px rgba(0,0,0,.7);animation:cardIn .5s cubic-bezier(.22,1,.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.login-card::before,.login-card::after{content:'';position:absolute;width:10px;height:10px;border-color:rgba(245,200,66,.4);border-style:solid;opacity:.6}
.login-card::before{top:10px;left:10px;border-width:2px 0 0 2px}
.login-card::after{bottom:10px;right:10px;border-width:0 2px 2px 0}
.login-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--raised),var(--hover));border:1px solid rgba(245,200,66,.35);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 22px;box-shadow:0 0 20px rgba(245,200,66,.25)}
.login-title{font-family:var(--fp);font-size:13px;color:var(--gold);text-align:center;line-height:1.9;letter-spacing:1px;margin-bottom:8px}
.login-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:28px}
.f-label{font-size:15px;font-weight:700;font-family:var(--fu);color:var(--subdued);margin-bottom:8px;display:block}
.f-wrap{position:relative;margin-bottom:14px}
.f-wrap input,.f-wrap select{width:100%;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);color:var(--txt);font-size:16px;font-family:var(--fu);font-weight:500;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none}
.f-wrap input:focus,.f-wrap select:focus{border-color:rgba(245,200,66,.5);box-shadow:0 0 0 3px rgba(245,200,66,.2)}
.f-wrap input::placeholder{color:var(--muted)}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.sel-wrap select{cursor:pointer;padding-right:34px}
.sel-wrap select option{background:var(--panel)}
.sel-loading{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);color:var(--muted);font-size:15px;font-family:var(--fu);display:flex;align-items:center;gap:8px}
.btn-gold{width:100%;padding:15px;background:var(--gold);border:none;border-radius:var(--r-md);color:#0d0a00;font-family:var(--fu);font-size:17px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:transform .12s,box-shadow .2s,background .15s;box-shadow:0 4px 20px rgba(245,200,66,.35);margin-top:10px}
.btn-gold:hover{background:#f8d55a;transform:translateY(-1px);box-shadow:0 6px 28px rgba(245,200,66,.5)}
.btn-gold:active{transform:scale(.98)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}
.l-err{font-size:13px;font-family:var(--fu);color:var(--red);text-align:center;min-height:16px;margin-top:8px}
.l-info{font-size:13px;font-family:var(--fu);color:var(--teal);text-align:center;min-height:16px;margin-top:4px}
.l-foot{font-size:10px;color:var(--muted);text-align:center;margin-top:20px;line-height:1.7}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(245,200,66,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─ 게임 레이아웃 ─ */
#screen-game{flex-direction:column;align-items:center;justify-content:flex-start}
.game-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px;width:100%;height:100vh}

/* ─ HUD ─ */
.hud{display:flex;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.5);position:relative;height:52px}
.hc{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-right:1px solid rgba(255,255,255,.06);flex-shrink:0}
.hc:last-child{border-right:none}
.hi{font-size:14px;line-height:1}
.hd{display:flex;flex-direction:column;gap:1px}
.hl{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.hv{font-family:var(--fp);font-size:10px;color:var(--txt);line-height:1}
.hv.gold{color:var(--gold)}.hv.teal{color:var(--teal)}
.hud-sync{font-size:9px;padding:3px 7px;border-radius:var(--r-sm);font-weight:700;transition:all .3s;white-space:nowrap}
.hud-sync.idle{color:var(--muted)}.hud-sync.saving{color:var(--gold);background:rgba(245,200,66,.1)}.hud-sync.saved{color:var(--teal);background:rgba(45,212,191,.1)}.hud-sync.error{color:var(--red);background:rgba(244,63,94,.1)}
.hud-badge{padding:4px 10px;border-radius:var(--r-sm);font-size:10px;font-weight:700;transition:all .3s;opacity:0;white-space:nowrap;background:var(--surface);color:var(--muted)}
.hud-badge.q{opacity:1;background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3)}
.hbtn{padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);color:var(--subdued);font-size:11px;font-family:var(--fu);cursor:pointer;transition:all .15s;margin:0 2px}
.hbtn:hover{background:var(--hover);color:var(--txt)}

/* ─ 캔버스 ─ */
.canvas-area{position:relative;border-radius:var(--r-lg);box-shadow:0 0 0 1px var(--border),0 8px 40px rgba(0,0,0,.7)}
#gc{display:block;outline:none;cursor:default;border-radius:var(--r-lg)}

/* ─ 오버레이 ─ */
.c-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:var(--r-lg);transition:opacity .3s;z-index:5}
.c-overlay.hidden{opacity:0;pointer-events:none}
.ot{font-family:var(--fp);font-size:15px;color:var(--gold);text-shadow:0 0 20px rgba(245,200,66,.4);letter-spacing:2px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.oh{font-size:12px;color:var(--subdued)}
.kc{display:flex;gap:5px;margin-top:4px}
.k{padding:3px 9px;background:var(--surface);border:1px solid var(--border);border-radius:3px;font-family:var(--fp);font-size:7px;color:var(--subdued)}

/* ─ 스테이지 클리어 ─ */
.clear-overlay{position:absolute;inset:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:var(--r-lg);z-index:6;opacity:0;pointer-events:none;transition:opacity .4s}
.clear-overlay.show{opacity:1;pointer-events:all}
.clear-title{font-family:var(--fp);font-size:18px;color:var(--gold);text-shadow:0 0 30px rgba(245,200,66,.6);animation:bounce .5s ease-in-out infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
.clear-sub{font-size:15px;font-family:var(--fu);font-weight:500;color:var(--teal);text-align:center;line-height:1.7}
.clear-score{font-family:var(--fu);font-size:26px;font-weight:700;color:#fff;text-shadow:0 0 20px rgba(245,200,66,.8)}
.btn-clear{padding:14px 26px;background:var(--gold);border:none;border-radius:var(--r-md);color:#0d0a00;font-family:var(--fu);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(245,200,66,.4);transition:transform .15s}
.btn-clear:hover{transform:scale(1.05)}

/* ─ 상태 바 ─ */
.statusbar{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-lg);padding:5px 14px;font-size:10px;color:var(--muted)}
.si{display:flex;align-items:center;gap:5px;white-space:nowrap}

/* ─ 퀴즈 팝업 ─ */
.qz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s}
.qz-overlay.open{opacity:1;pointer-events:all}
.qz-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-xl);width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.8);transform:translateY(16px) scale(.97);transition:transform .3s cubic-bezier(.22,1,.36,1);position:relative}
.qz-overlay.open .qz-card{transform:none}
.qz-tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.qz-tag.choice{background:rgba(96,165,250,.12);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.qz-tag.short{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.qz-tag.essay{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.qz-xbtn{width:28px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.qz-xbtn:hover{background:var(--hover);color:var(--txt)}
.qz-body{padding:20px 22px}
.qz-pts{display:none}
.qz-pv{font-family:var(--fu);font-size:13px;font-weight:700;color:var(--gold);margin-left:auto}
.qz-attempt{font-size:11px;font-family:var(--fu);color:var(--muted)}
.qz-q{font-size:18px;font-weight:600;font-family:var(--fu);line-height:1.6;color:var(--txt);margin-bottom:20px;white-space:pre-line}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:center;gap:11px;width:100%;padding:12px 14px;background:#0d1220;border:1px solid rgba(255,255,255,.07);border-radius:var(--r-md);color:var(--txt);font-size:14px;font-family:var(--fu);cursor:pointer;text-align:left;transition:background .15s,border-color .15s,transform .1s}
.opt:hover:not(:disabled){background:var(--surface);border-color:var(--border);transform:translateX(3px)}
.opt:disabled{cursor:default}
.opt.ok{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--green);animation:pop .4s cubic-bezier(.22,1,.36,1) both}
.opt.ng{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.3);color:var(--red);animation:shake .4s ease both}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.onum{width:26px;height:26px;border-radius:3px;background:var(--raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.opt.ok .onum{background:rgba(74,222,128,.2);border-color:rgba(74,222,128,.4);color:var(--green)}
.opt.ng .onum{background:rgba(244,63,94,.15);border-color:rgba(244,63,94,.3);color:var(--red)}
.si-wrap{display:flex;gap:7px}
.si-inp{flex:1;padding:11px 14px;background:#0d1220;border:1px solid var(--border);border-radius:var(--r-md);color:var(--txt);font-size:16px;font-family:var(--fu);font-weight:500;outline:none;transition:border-color .2s,box-shadow .2s}
.si-inp:focus{border-color:rgba(45,212,191,.4);box-shadow:0 0 0 3px rgba(45,212,191,.12)}
.si-inp::placeholder{color:transparent}
.si-inp:disabled{opacity:.5}
.es-hint{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.kws{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.kw{padding:2px 9px;background:var(--raised);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--subdued);transition:all .2s}
.kw.found{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:var(--green)}
.es-ta{width:100%;padding:12px 14px;background:#0d1220;border:1px solid var(--border);border-radius:var(--r-md);color:var(--txt);font-size:16px;font-family:var(--fu);font-weight:500;line-height:1.6;outline:none;resize:vertical;min-height:90px;margin-bottom:8px;transition:border-color .2s}
.es-ta:focus{border-color:rgba(167,139,250,.4);box-shadow:0 0 0 3px rgba(167,139,250,.1)}
.es-ta:disabled{opacity:.5}
.btn-sub{padding:10px 20px;background:var(--teal);border:none;border-radius:var(--r-md);color:#030e0d;font-family:var(--fu);font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(45,212,191,.3)}
.btn-sub:hover{background:#5eead4;transform:translateY(-1px)}
.btn-sub:disabled{opacity:.4;cursor:not-allowed;transform:none}
.res{display:flex;align-items:center;gap:11px;padding:13px 14px;border-radius:var(--r-md);margin-top:14px;font-size:13px;font-weight:500;font-family:var(--fu);animation:slideUp .3s cubic-bezier(.22,1,.36,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.res.ok-res{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green)}
.res.ng-res{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);color:#ff8099}
.ri{font-size:21px}.rt{flex:1;line-height:1.5}.rp{font-family:var(--fu);font-size:13px;font-weight:700;white-space:nowrap}
.save-s{font-size:10px;color:var(--muted);margin-top:6px;text-align:right;min-height:14px}
.save-s.saving{color:var(--gold)}.save-s.saved{color:var(--teal)}.save-s.error{color:var(--red)}
.btn-cont{padding:9px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);color:var(--subdued);font-size:13px;font-family:var(--fu);cursor:pointer;transition:all .15s}
.qz-img-wrap{margin:0 0 16px;text-align:center;border-radius:var(--r-md);overflow:hidden;background:var(--surface);border:1px solid var(--border)}
.qz-img-wrap img{max-width:100%;max-height:260px;object-fit:contain;display:block;margin:0 auto}
.qz-img-wrap .img-load{padding:24px;color:var(--muted);font-size:12px;font-family:var(--fu)}
.btn-cont:hover{background:var(--hover);color:var(--txt)}

/* ─ 부유 텍스트 ─ */
#float-layer{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden}
.float-text{position:absolute;font-family:var(--fp);font-size:13px;font-weight:700;white-space:nowrap;pointer-events:none;animation:floatUp 1.1s cubic-bezier(.22,1,.36,1) forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-40px) scale(1.1)}100%{opacity:0;transform:translateY(-70px) scale(.9)}}


/* ─ 맵 선택 버튼 ─ */
.map-btn{padding:10px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);color:var(--subdued);font-family:var(--fu);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;flex:1;min-width:0;text-align:center;line-height:1.2}
.map-btn:hover{background:var(--hover);color:var(--txt)}
.map-btn.active{background:rgba(245,200,66,.15);border-color:rgba(245,200,66,.5);color:var(--gold)}


/* ─ HUD 정리: 글자 작게, 한 줄 표시 ─ */
.hud{
  width:min(1200px, calc(100vw - 20px));
  height:70px;
  display:grid;
  grid-template-columns:20% 16% 16% 30% 18%;
  align-items:center;
  background:rgba(17,24,39,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  position:relative;
}
.hud-item{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:0 12px;
  border-right:1px solid rgba(255,255,255,.06);
  min-width:0;
}
.hud-item:last-of-type{border-right:none}
.hud-item.player{justify-content:flex-start;padding-left:26px}
.hud-icon{font-size:24px;line-height:1;flex-shrink:0}
.hud-main{
  font-family:var(--fu);
  font-size:18px;
  font-weight:700;
  color:var(--txt);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  min-width:0;
}
#hv-name{max-width:none}
.hud-main.gold{color:var(--gold)}
.hud-main.teal{color:var(--teal)}
.hud-main.blue{color:var(--blue)}
.hud-item.theme{flex-direction:row;gap:8px}
.hud-item.theme .hud-icon{font-size:22px}
.hud-item.theme .hud-main{font-size:16px;line-height:1}
.hud-item.theme{min-width:140px;}

#hv-score{overflow:visible;text-overflow:clip;max-width:none;min-width:64px;text-align:center;}
#hv-sheet{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#hud-theme{overflow:visible;text-overflow:clip;white-space:nowrap;}

@media(max-width:900px){
  .hud{height:64px;grid-template-columns:1fr .8fr .8fr 1.6fr .8fr;}
  .hud-item{gap:6px;padding:0 7px}
  .hud-item.player{padding-left:12px} 
  .hud-icon{font-size:20px;}
.hud-item.player .hud-main{
  font-size:20px;
  font-weight:700;
}
  .hud-icon{font-size:20px}
  .hud-main{font-size:15px}
  #hv-name{max-width:none}
  #hv-sheet{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .hud-item.theme .hud-icon{font-size:19px}
  .hud-item.theme .hud-main{font-size:14px}
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--hover);border-radius:3px}
</style>
</head>
<body>

<!-- ─ 로그인 화면 ─ -->
<div class="screen" id="scr-login">
  <div class="login-card">
    <div class="login-icon">👾</div>
    <div class="login-title">PACMAN style<br>QUIZ ADVENTURE</div>

    <label class="f-label">반 · 번호 · 이름</label>
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:stretch">
      <div class="f-wrap" style="width:64px;margin-bottom:0;flex-shrink:0">
        <input id="inp-ban" type="number" placeholder="반" min="1" max="20" style="text-align:center;padding:13px 6px">
      </div>
      <div class="f-wrap" style="width:64px;margin-bottom:0;flex-shrink:0">
        <input id="inp-num" type="number" placeholder="번호" min="1" max="40" style="text-align:center;padding:13px 6px">
      </div>
      <div class="f-wrap" style="flex:1;margin-bottom:0">
        <input id="inp-name" type="text" placeholder="이름" maxlength="12" autocomplete="off" autofocus>
      </div>

// ── GAS 통신 ──────────────────────────────────────────────
function callServer(action, payload = {}) {
  return new Promise((resolve, reject) => {
    // Apps Script/스프레드시트가 처음 열릴 때는 10초를 넘기는 경우가 있어 넉넉하게 대기
    const waitMs = action === 'getImageDataUrl' ? 30000 : 45000;
    const timeout = setTimeout(() => reject(new Error('timeout')), waitMs);
    const _resolve = d => { clearTimeout(timeout); resolve(d); };
    const _reject  = e => { clearTimeout(timeout); reject(e); };
    if (GAS_MODE) {
      const r = google.script.run
        .withSuccessHandler(d => _resolve(d))
        .withFailureHandler(e => _reject(new Error(e.message || String(e))));

      switch (action) {
        case 'loginOrRegister': r.loginOrRegister(payload.ban, payload.num, payload.name); break;
        case 'getPlayerInfo':   r.getPlayerInfo(payload.ban, payload.num, payload.name); break;
        case 'submitAnswer':    r.submitAnswer(payload.ban, payload.num, payload.name, payload.questionNum, payload.answer, payload.isCorrect); break;
        case 'saveStageScore':  r.saveStageScore(payload.ban, payload.num, payload.name, payload.stageName, payload.stageScore, payload.solved); break;
        case 'savePosition':    r.savePosition(payload.ban, payload.num, payload.name); break;
        case 'getQuizBank':     r.getQuizBank(payload.sheetName); break;
        case 'getImageDataUrl': r.getImageDataUrl(payload.fileId || payload.url); break;
        case 'getSheetNames':   r.getQuizSheetNames(); break;
        default: _reject(new Error('unknown action'));
      }
    } else {
      if (!SCRIPT_URL) {
        _reject(new Error('SCRIPT_URL이 비어 있습니다. 웹앱 배포 URL을 넣어 주세요.'));
        return;
      }
      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload }),
      })
        .then(r => r.json())
        .then(d => { if (d.ok === false) _reject(new Error(d.error)); else _resolve(d); })
        .catch(_reject);
    }
  });
}

// ── 캔버스 & 초기화 ───────────────────────────────────────
function resizeCanvas() {
  gc.width  = CW;
  gc.height = CH;
  const wrap = document.getElementById('ca-wrap');
  wrap.style.width  = CW + 'px';
  wrap.style.height = CH + 'px';
  const hud = document.getElementById('hud');
  hud.style.width = CW + 'px';

}

function calcLayout(mapIdx) {
  const m   = MAPS[mapIdx];
  ROWS      = m.grid.length;
  COLS      = m.grid[0].length;
  const availH = window.innerHeight - 48 - 30 - 10 - 16 - 10; // hud+status+gaps+padding
  const availW = window.innerWidth - 20;
  const tH  = Math.floor(availH / ROWS);
  const tW  = Math.floor(availW / COLS);
  TILE      = Math.max(16, Math.min(tH, tW));
  CW        = TILE * COLS;
  CH        = TILE * ROWS;
}

function initStage(mapIdx, resetScore) {
  curMapIdx  = mapIdx;
  const map  = MAPS[mapIdx];
  calcLayout(mapIdx);
  resizeCanvas();

  // 깊은 복사
  stageGrid = map.grid.map(r => [...r]);

  // 작은 점 / 퀴즈 노드 집계
  totalDots  = 0; eatenDots = 0;
  quizNodes  = []; quizSolved = 0; quizTotal = 0;
  bonusItems = [];
  clearShown = false;

  ghosts = [];
  let emptySpots = [];
  for(let r=0; r<ROWS; r++){
    for(let c=0; c<COLS; c++){
      if(stageGrid[r][c] === 2 || stageGrid[r][c] === 0) {
        if(Math.abs(c - player.x) + Math.abs(r - player.y) > 10) {
          emptySpots.push({c, r});
        }
      }
    }
  }
  emptySpots.sort(() => Math.random() - 0.5);
  for(let i=0; i<4; i++){
    if(emptySpots[i]){
      ghosts.push({
        x: emptySpots[i].c, y: emptySpots[i].r,
        dir: Math.floor(Math.random()*4), // 0:R, 1:L, 2:U, 3:D
        type: i
      });
    }
  }
  

  // ── 퀴즈 노드 랜덤 배치 ──────────────────────────────
  // 1단계: 맵의 모든 3을 2로 평탄화하고 작은 점 전체 수 집계
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = stageGrid[r][c];
      if (t === 2) totalDots++;
      if (t === 3) { stageGrid[r][c] = 2; totalDots++; } // 퀴즈 위치 → 작은 점으로 평탄화
    }
  }

  // 2단계: 퀴즈 수 = 시트에서 불러온 문제 수 (quizPool)
  //         폴백: quizPool 없으면 맵 원본 3 개수(4개) 그대로
  const poolSize = quizPool.length > 0 ? quizPool.length : 4;
  quizTotal = poolSize;

  // 3단계: 작은 점(2) 위치 셔플 후 quizTotal개를 3으로 랜덤 배치
  // 공간 분할로 고르게 배치
  const spawnXQ2 = MAPS[mapIdx].spawn[0];
  const spawnYQ2 = MAPS[mapIdx].spawn[1];
  const quizCells = pickSpread(2, null, spawnXQ2, spawnYQ2, 2, quizTotal);
  quizCells.forEach(([col, r]) => {
    stageGrid[r][col] = 3;
    totalDots--;   // 작은 점 → 퀴즈존으로 변경
    const key = `${col}-${r}`;
    quizNodes.push({ col, row:r, key, solved:false, attempts:0, lastPts:null });
  });

  // 플레이어 위치
  player.x = map.spawn[0];
  player.y = map.spawn[1];
  // stageScore(이번 스테이지 점수)만 초기화, player.score(누적)·stageScores(최고점표)는 유지
  player.stageScore = 0;

  // ── 테마 설정 ──────────────────────────────────────
  const mapTheme = MAPS[mapIdx].theme || 'space';
  curTheme = THEMES[mapTheme] || THEMES.space;
  initBgParticles();

  // HUD 테마 이름 표시
  const themeIconEl = document.getElementById('hud-theme-icon');
  const themeEl = document.getElementById('hud-theme');
  if (themeIconEl && themeEl) {
    const parts = String(curTheme.name || '').trim().split(/\s+/);
    themeIconEl.textContent = parts[0] || '🎮';
    themeEl.textContent = parts.slice(1).join(' ') || curTheme.name || '맵';
  } else if (themeEl) {
    themeEl.textContent = curTheme.name;
  }

  updateHUD();
  document.getElementById('clear-ov').classList.remove('show');
  document.getElementById('c-ov').classList.remove('hidden');
  gameActive = false;

  // ── 빨간 원 장애물 랜덤 배치 (5~10개) ──────────────
  placeObstacles();

  // 보너스 아이템 배치 (5개, 퀴즈/장애물 위치 제외)
  placeBonusItems();

  // 퀴즈 파워펠릿 ↔ quizDB 매핑
  assignQuizzesToNodes();
}

function placeBonusItems() {
  const spawnX   = MAPS[curMapIdx].spawn[0];
  const spawnY   = MAPS[curMapIdx].spawn[1];
  const quizKeys = new Set(quizNodes.map(n => n.key));
  // 장애물(4) 위치도 제외
  const obsKeys  = new Set();
  for (let r = 0; r < ROWS; r++)
    for (let col = 0; col < COLS; col++)
      if (stageGrid[r][col] === 4) obsKeys.add(`${col}-${r}`);
  const excludeKeys = new Set([...quizKeys, ...obsKeys]);

  const picked = pickSpread(2, excludeKeys, spawnX, spawnY, 3, 5);
  picked.forEach(([col, r]) => {
    stageGrid[r][col] = 5; // 타일 5 = 보너스 아이템
    const color = Math.random() < 0.5 ? 'green' : 'blue';
    const score = 1 + Math.floor(Math.random() * 10); // 1~10점
    const key   = `${col}-${r}`;
    bonusItems.push({ col, row: r, key, color, score });
  });
}

function pickSpread(tileType, excludeKeys, safeX, safeY, safeR, targetCount) {
  // 맵을 gW × gH 격자로 나누어 각 셀에서 후보를 수집
  const gCols = Math.ceil(Math.sqrt(targetCount * COLS / ROWS));
  const gRows = Math.ceil(targetCount / gCols);
  const cellW = COLS / gCols;
  const cellH = ROWS / gRows;

  const result = [];
  for (let gr = 0; gr < gRows; gr++) {
    for (let gc = 0; gc < gCols; gc++) {
      if (result.length >= targetCount) break;
      // 이 격자 셀 내의 후보 수집
      const cMinC = Math.floor(gc * cellW);
      const cMaxC = Math.floor((gc + 1) * cellW);
      const cMinR = Math.floor(gr * cellH);
      const cMaxR = Math.floor((gr + 1) * cellH);
      const bucket = [];
      for (let r = cMinR; r < cMaxR && r < ROWS; r++) {
        for (let col = cMinC; col < cMaxC && col < COLS; col++) {
          if (stageGrid[r][col] !== tileType) continue;
          if (Math.abs(col - safeX) <= safeR && Math.abs(r - safeY) <= safeR) continue;
          if (excludeKeys && excludeKeys.has(`${col}-${r}`)) continue;
          bucket.push([col, r]);
        }
      }
      if (bucket.length === 0) continue;
      // 셀 내에서 랜덤 1개
      result.push(bucket[Math.floor(Math.random() * bucket.length)]);
    }
  }
  // 목표 수 채우기 부족 시 남은 후보에서 보충
  if (result.length < targetCount) {
    const resultSet = new Set(result.map(([col,r]) => `${col}-${r}`));
    const extras = [];
    for (let r = 0; r < ROWS; r++) {
      for (let col = 0; col < COLS; col++) {
        if (stageGrid[r][col] !== tileType) continue;
        if (Math.abs(col - safeX) <= safeR && Math.abs(r - safeY) <= safeR) continue;
        if (excludeKeys && excludeKeys.has(`${col}-${r}`)) continue;
        if (resultSet.has(`${col}-${r}`)) continue;
        extras.push([col, r]);
      }
    }
    extras.sort(() => Math.random() - 0.5);
    result.push(...extras.slice(0, targetCount - result.length));
  }
  return result;
}

function placeObstacles() {
  const spawnX = MAPS[curMapIdx].spawn[0];
  const spawnY = MAPS[curMapIdx].spawn[1];
  const quizKeys = new Set(quizNodes.map(n => n.key));
  const count = 5 + Math.floor(Math.random() * 6); // 5~10개

  const picked = pickSpread(2, quizKeys, spawnX, spawnY, 3, count);
  picked.forEach(([col, r]) => {
    stageGrid[r][col] = 4;
  });
}

// ── 테마 & 파티클 ─────────────────────────────────────────
function initBgParticles() {
  bgParticles = [];
  const theme = curTheme;
  if (theme === THEMES.space) {
    // 별 200개
    for (let i = 0; i < 350; i++) {
      bgParticles.push({
        x: Math.random() * CW, y: Math.random() * CH,
        r: Math.random() * 1.8 + 0.3,
        brightness: Math.random(),
        speed: Math.random() * 0.3 + 0.05,
        type: 'star',
      });
    }
  } else if (theme === THEMES.ocean) {
    // 기포 60개
    for (let i = 0; i < 60; i++) {
      bgParticles.push({
        x: Math.random() * CW, y: Math.random() * CH + CH,
        r: Math.random() * 3 + 1.5,
        speed: Math.random() * 0.5 + 0.2,
        wobble: Math.random() * Math.PI * 2,
        type: 'bubble',
      });
    }
    // 물고기 8마리
    for (let i = 0; i < 8; i++) {
      bgParticles.push({
        x: Math.random() * CW, y: CH * (0.2 + Math.random() * 0.7),
        speed: (0.4 + Math.random() * 0.6) * (Math.random()<0.5?1:-1),
        size: TILE * (0.18 + Math.random() * 0.14),
        color: ['rgba(255,180,50,', 'rgba(255,100,80,', 'rgba(80,200,255,', 'rgba(255,220,80,'][i%4],
        tailPhase: Math.random() * Math.PI * 2,
        type: 'fish',
      });
    }
    // 고래 2마리
    for (let i = 0; i < 2; i++) {
      bgParticles.push({
        x: i === 0 ? -CW*0.3 : CW*1.3,
        y: CH * (0.25 + Math.random() * 0.35),
        speed: (0.18 + Math.random() * 0.1) * (i===0 ? 1 : -1),
        phase: Math.random() * Math.PI * 2,
        type: 'whale',
      });
    }
  } else if (theme === THEMES.forest) {
    // 반딧불 40개
    for (let i = 0; i < 40; i++) {
      bgParticles.push({
        x: Math.random() * CW, y: Math.random() * CH,
        dx: (Math.random()-0.5)*0.4, dy: (Math.random()-0.5)*0.3,
        phase: Math.random() * Math.PI * 2,
        type: 'firefly',
      });
    }
    // 새 5마리
    for (let i = 0; i < 5; i++) {
      bgParticles.push({
        x: Math.random() * CW,
        y: CH * (0.05 + Math.random() * 0.35),
        speed: (0.5 + Math.random() * 0.8) * (Math.random()<0.5?1:-1),
        dy: (Math.random()-0.5) * 0.15,
        wingPhase: Math.random() * Math.PI * 2,
        size: TILE * (0.12 + Math.random() * 0.08),
        type: 'bird',
      });
    }
  } else if (theme === THEMES.classroom) {
    // 먼지 80개
    for (let i = 0; i < 80; i++) {
      bgParticles.push({
        x: Math.random() * CW, y: Math.random() * CH,
        dx: (Math.random()-0.5)*0.15, dy: -Math.random()*0.2-0.05,
        r: Math.random()*1.5+0.5,
        type: 'dust',
      });
    }
  }
}

function drawBg(ts) {
  const t  = curTheme;
  const bg = t.bgColors;
  // 그라디언트 배경
  const grad = ctx.createLinearGradient(0, 0, 0, CH);
  grad.addColorStop(0,   bg[0]);
  grad.addColorStop(0.5, bg[1]);
  grad.addColorStop(1,   bg[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CW, CH);

  // 파티클
  bgParticles.forEach(p => {
    if (p.type === 'star') {
      // 별 반짝임
      const twinkle = 0.4 + Math.sin(ts * p.speed * 0.01 + p.brightness * 6) * 0.6;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.9})`;
      ctx.fill();
      // 밝은 별 글로우
      if (p.r > 1.2) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*2.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,200,255,${twinkle*0.15})`;
        ctx.fill();
      }
    } else if (p.type === 'bubble') {
      p.y -= p.speed; p.wobble += 0.04;
      p.x += Math.sin(p.wobble) * 0.4;
      if (p.y < -p.r*2) { p.y = CH + p.r; p.x = Math.random()*CW; }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(96,232,255,0.35)'; ctx.lineWidth = 0.8; ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x - p.r*0.3, p.y - p.r*0.3, p.r*0.25, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
    } else if (p.type === 'fish') {
      // 대각선 이동
      p.x += p.speed; p.y += p.dy;
      p.tailPhase += 0.12;
      if (p.speed > 0 && p.x > CW + p.size*4) { p.x = -p.size*4; p.y = CH*(0.15+Math.random()*0.72); }
      if (p.speed < 0 && p.x < -p.size*4) { p.x = CW+p.size*4; p.y = CH*(0.15+Math.random()*0.72); }
      if (p.y < CH*0.1) p.dy = Math.abs(p.dy);
      if (p.y > CH*0.88) p.dy = -Math.abs(p.dy);
      const fs = p.size, flip = p.speed < 0 ? -1 : 1;
      const tail = Math.sin(p.tailPhase) * fs * 0.45;
      ctx.save(); ctx.translate(p.x, p.y); ctx.scale(flip, 1);
      const ft = p.ftype || 'normal';

      if (ft === 'clownfish') {
        // 흰동가리 — 주황+흰 줄무늬
        ctx.beginPath(); ctx.ellipse(0, 0, fs*1.1, fs*0.6, 0, 0, Math.PI*2);
        ctx.fillStyle='rgba(255,100,20,0.65)'; ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.55)';
        ctx.fillRect(-fs*0.15, -fs*0.55, fs*0.22, fs*1.1);
        ctx.fillRect(fs*0.35, -fs*0.55, fs*0.15, fs*1.1);
        ctx.beginPath(); ctx.moveTo(-fs*0.8,0); ctx.lineTo(-fs*1.4,-fs*0.5+tail); ctx.lineTo(-fs*1.4,fs*0.5+tail); ctx.closePath();
        ctx.fillStyle='rgba(255,120,30,0.5)'; ctx.fill();
      } else if (ft === 'pufferfish') {
        // 복어 — 둥글고 뾰족한 가시
        ctx.beginPath(); ctx.arc(0, 0, fs*0.9, 0, Math.PI*2);
        ctx.fillStyle='rgba(180,220,80,0.55)'; ctx.fill();
        ctx.strokeStyle='rgba(100,150,30,0.40)'; ctx.lineWidth=1; ctx.stroke();
        // 가시
        for(let s=0;s<8;s++){
          const a=s*Math.PI/4, sp=fs*1.3;
          ctx.beginPath(); ctx.moveTo(Math.cos(a)*fs*0.85, Math.sin(a)*fs*0.85);
          ctx.lineTo(Math.cos(a)*sp, Math.sin(a)*sp);
          ctx.strokeStyle='rgba(100,150,30,0.50)'; ctx.lineWidth=1.2; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(fs*0.5,-fs*0.2,fs*0.18,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fill();
      } else if (ft === 'shrimp') {
        // 새우 — 활 모양 몸통
        ctx.strokeStyle='rgba(255,150,100,0.65)'; ctx.lineWidth=fs*0.55;
        ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(fs*1.2, -fs*0.3);
        ctx.quadraticCurveTo(0, -fs*0.6, -fs*0.8, fs*0.1);
        ctx.quadraticCurveTo(-fs*1.3, fs*0.5, -fs*0.8, fs*0.8);
        ctx.stroke();
        // 더듬이
        ctx.strokeStyle='rgba(255,180,130,0.45)'; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(fs*1.2,-fs*0.3); ctx.lineTo(fs*2.0,-fs*0.9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(fs*1.2,-fs*0.3); ctx.lineTo(fs*2.0,-fs*0.1); ctx.stroke();
      } else if (ft === 'oilfish') {
        // 갈치 — 길고 납작한 은색
        ctx.beginPath(); ctx.ellipse(0, 0, fs*2.2, fs*0.25, 0, 0, Math.PI*2);
        ctx.fillStyle='rgba(200,220,240,0.60)'; ctx.fill();
        ctx.strokeStyle='rgba(160,200,220,0.35)'; ctx.lineWidth=0.8; ctx.stroke();
        // 등지느러미
        ctx.beginPath(); ctx.moveTo(fs*1.5,0); ctx.lineTo(fs*0.5,-fs*0.6); ctx.lineTo(-fs*1.5,0); ctx.stroke();
        ctx.beginPath(); ctx.arc(fs*1.8,-fs*0.05,fs*0.12,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fill();
      } else {
        // 일반 물고기
        ctx.beginPath(); ctx.ellipse(0, 0, fs*1.0, fs*0.42, 0, 0, Math.PI*2);
        ctx.fillStyle='rgba(255,180,50,0.55)'; ctx.fill();
        ctx.beginPath(); ctx.moveTo(-fs*0.7,0); ctx.lineTo(-fs*1.35,-fs*0.48+tail); ctx.lineTo(-fs*1.35,fs*0.48+tail); ctx.closePath();
        ctx.fillStyle='rgba(255,150,30,0.45)'; ctx.fill();
        ctx.beginPath(); ctx.arc(fs*0.38,-fs*0.08,fs*0.12,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fill();
      }
      ctx.restore();
    } else if (p.type === 'whale') {
      // 고래 이동
      p.x += p.speed;
      p.phase += 0.008;
      const wy = p.y + Math.sin(p.phase) * TILE * 0.8;
      if (p.speed > 0 && p.x > CW + TILE*8) p.x = -TILE*8;
      if (p.speed < 0 && p.x < -TILE*8) p.x = CW + TILE*8;
      const ws = TILE * 2.2, flip = p.speed < 0 ? -1 : 1;
      ctx.save(); ctx.translate(p.x, wy); ctx.scale(flip, 1);
      // 몸통
      ctx.beginPath(); ctx.ellipse(0, 0, ws, ws*0.38, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(40,80,160,0.35)'; ctx.fill();
      // 배 밝은 부분
      ctx.beginPath(); ctx.ellipse(ws*0.1, ws*0.1, ws*0.55, ws*0.18, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(100,160,220,0.2)'; ctx.fill();
      // 꼬리
      ctx.beginPath();
      ctx.moveTo(-ws*0.85, 0);
      ctx.lineTo(-ws*1.2, -ws*0.35); ctx.lineTo(-ws*1.0, 0);
      ctx.lineTo(-ws*1.2,  ws*0.35); ctx.closePath();
      ctx.fillStyle = 'rgba(30,60,140,0.30)'; ctx.fill();
      // 분수 (간헐적)
      if (Math.sin(p.phase * 3) > 0.85) {
        ctx.strokeStyle = 'rgba(180,230,255,0.4)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(ws*0.5, -ws*0.28);
        ctx.lineTo(ws*0.4, -ws*0.7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ws*0.5, -ws*0.28);
        ctx.lineTo(ws*0.6, -ws*0.65); ctx.stroke();
      }
      ctx.restore();
    } else if (p.type === 'firefly') {
      p.x += p.dx; p.y += p.dy;
      p.phase += 0.03;
      if (p.x<0) p.x=CW; if (p.x>CW) p.x=0;
      if (p.y<0) p.y=CH; if (p.y>CH) p.y=0;
      const glow = (Math.sin(p.phase)+1)*0.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,255,100,${0.5+glow*0.5})`; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(180,255,80,${glow*0.25})`; ctx.fill();
    } else if (p.type === 'bird') {
      // 새 — 날갯짓 애니메이션
      p.x += p.speed; p.y += p.dy;
      p.wingPhase += 0.12;
      if (p.speed > 0 && p.x > CW + 20) { p.x = -20; p.y = CH*(0.05+Math.random()*0.35); }
      if (p.speed < 0 && p.x < -20)     { p.x = CW+20; p.y = CH*(0.05+Math.random()*0.35); }
      if (p.y < 5) p.dy = Math.abs(p.dy);
      if (p.y > CH*0.4) p.dy = -Math.abs(p.dy);
      const flip = p.speed < 0 ? -1 : 1;
      const wing = Math.sin(p.wingPhase) * p.size * 1.4;
      ctx.save(); ctx.translate(p.x, p.y); ctx.scale(flip, 1);
      ctx.strokeStyle = 'rgba(30,20,10,0.55)'; ctx.lineWidth = 1.5;
      // 왼쪽 날개
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.quadraticCurveTo(-p.size*1.2, -wing, -p.size*2.2, wing*0.3);
      ctx.stroke();
      // 오른쪽 날개
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.quadraticCurveTo(p.size*0.6, -wing*0.6, p.size*1.4, wing*0.2);
      ctx.stroke();
      ctx.restore();
    } else if (p.type === 'dust') {
      // 먼지 부유
      p.x += p.dx; p.y += p.dy;
      if (p.y < -2) { p.y = CH; p.x = Math.random()*CW; }
      if (p.x < 0) p.x = CW; if (p.x > CW) p.x = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,240,180,0.15)'; ctx.fill();
    }
  });

  // 테마별 고정 장식
  if (t === THEMES.space) drawSpaceDecorations(ts);
  else if (t === THEMES.ocean) drawOceanDecorations(ts);
  else if (t === THEMES.forest) drawForestDecorations(ts);
  else if (t === THEMES.classroom) drawClassroomDecorations(ts);
}

function drawSpaceDecorations(ts) {
  // 행성 데이터: [x비율, y비율, r비율, 색상1, 색상2, 고리여부]
  const planets = [
    [0.88, 0.10, 0.13, 'rgba(180,80,255,0.25)',  'rgba(80,20,160,0.10)',  true],
    [0.08, 0.78, 0.09, 'rgba(60,200,255,0.22)',  'rgba(20,80,160,0.10)',  false],
    [0.92, 0.72, 0.07, 'rgba(255,150,60,0.20)',  'rgba(160,60,10,0.09)',  false],
    [0.04, 0.18, 0.05, 'rgba(100,255,180,0.18)', 'rgba(20,120,80,0.08)',  false],
    [0.55, 0.04, 0.06, 'rgba(255,200,80,0.18)',  'rgba(160,100,10,0.08)', true],
  ];
  planets.forEach(([xr, yr, rr, c1, c2, ring]) => {
    const px = CW*xr, py = CH*yr, pr = CW*rr;
    const gp = ctx.createRadialGradient(px-pr*0.3, py-pr*0.3, pr*0.1, px, py, pr);
    gp.addColorStop(0, c1); gp.addColorStop(1, c2);
    ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2);
    ctx.fillStyle = gp; ctx.fill();
    if (ring) {
      ctx.beginPath(); ctx.ellipse(px, py+pr*0.08, pr*1.65, pr*0.20, Math.PI*0.15, 0, Math.PI*2);
      ctx.strokeStyle = c1.replace('0.25','0.14').replace('0.18','0.12');
      ctx.lineWidth = pr*0.12; ctx.stroke();
    }
  });
  // 유성 2개
  const mt1 = (ts*0.04)%1;
  const mx1 = CW*(0.10+mt1*0.75), my1 = CH*(0.04+mt1*0.38);
  ctx.beginPath(); ctx.moveTo(mx1,my1); ctx.lineTo(mx1-TILE*2.2,my1-TILE*1.1);
  ctx.strokeStyle=`rgba(255,255,200,${0.45*(1-mt1)})`; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(mx1,my1,2,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,220,${0.8*(1-mt1)})`; ctx.fill();

  const mt2 = ((ts*0.028)+0.5)%1;
  const mx2 = CW*(0.60+mt2*0.35), my2 = CH*(0.02+mt2*0.50);
  ctx.beginPath(); ctx.moveTo(mx2,my2); ctx.lineTo(mx2-TILE*1.5,my2-TILE*0.7);
  ctx.strokeStyle=`rgba(200,220,255,${0.35*(1-mt2)})`; ctx.lineWidth=1.0; ctx.stroke();
}

function drawOceanDecorations(ts) {
  // 수면 물결 (상단)
  ctx.beginPath();
  for (let x=0; x<=CW; x+=4) {
    const y = TILE*0.3 + Math.sin(x*0.04+ts*0.002)*3 + Math.sin(x*0.07+ts*0.003)*2;
    x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.strokeStyle='rgba(60,200,255,0.1)'; ctx.lineWidth=1.5; ctx.stroke();
  // 광선 (위에서 내려오는 빛)
  for (let i=0; i<5; i++) {
    const lx = CW*(0.12+i*0.18) + Math.sin(ts*0.001+i)*10;
    ctx.beginPath();
    ctx.moveTo(lx,0); ctx.lineTo(lx+TILE*1.5,CH*0.5);
    ctx.strokeStyle=`rgba(60,180,255,${0.04+Math.sin(ts*0.002+i)*0.02})`; ctx.lineWidth=TILE*0.6; ctx.stroke();
  }
  // 해초 (하단) — 굵고 높이 다양
  const seaweedHeights = [4.5, 7.0, 5.5, 8.5, 3.5, 6.5, 9.0, 4.0, 7.5, 5.0, 8.0, 6.0];
  for (let i=0; i<12; i++) {
    const sx = CW*(0.02+i*0.083);
    const sy = CH;
    const h  = TILE * seaweedHeights[i];
    const sway = Math.sin(ts*0.0015+i*0.8) * 20;
    // 메인 줄기
    ctx.beginPath(); ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(sx+sway*0.6, sy-h*0.55, sx+sway, sy-h);
    ctx.strokeStyle=`rgba(15,170,70,0.7)`; ctx.lineWidth=8; ctx.stroke();
    // 밝은 하이라이트 줄기
    ctx.beginPath(); ctx.moveTo(sx+3, sy);
    ctx.quadraticCurveTo(sx+3+sway*0.6, sy-h*0.55, sx+3+sway, sy-h);
    ctx.strokeStyle=`rgba(40,220,100,0.3)`; ctx.lineWidth=3; ctx.stroke();
    // 옆 잔가지 (중간 높이)
    const bx = sx + sway*0.5, by = sy - h*0.5;
    ctx.beginPath(); ctx.moveTo(bx, by);
    ctx.lineTo(bx + (i%2===0?1:-1)*TILE*1.2, by - TILE*0.8);
    ctx.strokeStyle=`rgba(20,180,80,0.5)`; ctx.lineWidth=5; ctx.stroke();
  }
}

function drawForestDecorations(ts) {
  const treeData = [
    [CW*0.04, TILE*10], [CW*0.17, TILE*15], [CW*0.30, TILE*9],
    [CW*0.48, TILE*17], [CW*0.62, TILE*11], [CW*0.76, TILE*14], [CW*0.90, TILE*8],
  ];
  treeData.forEach(([tx,h],i)=>{
    const ty = CH;
    const sway = Math.sin(ts*0.0008+i*1.3) * 5;
    // 몸통
    ctx.fillStyle = `rgba(100,55,15,0.80)`;
    ctx.fillRect(tx-14, ty-h, 28, h);
    ctx.fillStyle = `rgba(150,90,30,0.45)`;
    ctx.fillRect(tx-5, ty-h, 8, h);

    // 잎 — 세로 타원(ellipse), 나무 위쪽(30% 지점)부터 시작해 기둥 꼭대기 덮음
    const leafCx = tx + sway;
    const leafStart = ty - h * 0.70; // 나무 상단 30%부터 잎 시작
    ctx.save();
    // 하단 타원 (가장 크고 아래쪽) — 기둥 중간부 덮음
    ctx.beginPath();
    ctx.ellipse(leafCx, leafStart, TILE*2.6, TILE*4.2, 0, 0, Math.PI*2);
    ctx.fillStyle=`rgba(35,155,25,0.80)`; ctx.fill();
    ctx.strokeStyle=`rgba(70,220,50,0.28)`; ctx.lineWidth=2; ctx.stroke();
    // 중단 타원
    ctx.beginPath();
    ctx.ellipse(leafCx+sway*0.15, leafStart-TILE*3.2, TILE*2.0, TILE*3.0, 0, 0, Math.PI*2);
    ctx.fillStyle=`rgba(45,175,30,0.78)`; ctx.fill();
    ctx.strokeStyle=`rgba(85,235,60,0.25)`; ctx.lineWidth=1.8; ctx.stroke();
    // 상단 타원 (꼭대기 덮음)
    ctx.beginPath();
    ctx.ellipse(leafCx+sway*0.08, leafStart-TILE*6.0, TILE*1.3, TILE*2.1, 0, 0, Math.PI*2);
    ctx.fillStyle=`rgba(60,200,40,0.72)`; ctx.fill();
    ctx.strokeStyle=`rgba(100,250,75,0.22)`; ctx.lineWidth=1.2; ctx.stroke();
    ctx.restore();
  });
  // 안개
  const fog=ctx.createLinearGradient(0,CH-TILE*2,0,CH);
  fog.addColorStop(0,'rgba(180,255,160,0)'); fog.addColorStop(1,'rgba(160,240,140,0.10)');
  ctx.fillStyle=fog; ctx.fillRect(0,CH-TILE*3,CW,TILE*3);
}

function drawClassroomDecorations(ts) {
  // ── 칠판 (상단 중앙) ──
  const bx=CW*0.12, by=TILE*0.2, bw=CW*0.76, bh=TILE*3.6;
  ctx.fillStyle='rgba(20,70,30,0.35)'; ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='rgba(60,120,50,0.50)'; ctx.lineWidth=4; ctx.strokeRect(bx,by,bw,bh);
  // 칠판 테두리 나무 프레임
  ctx.strokeStyle='rgba(140,100,40,0.40)'; ctx.lineWidth=7; ctx.strokeRect(bx-3,by-3,bw+6,bh+6);
  // 칠판 글씨
  ctx.fillStyle='rgba(210,235,210,0.22)';
  for(let i=0;i<3;i++){
    ctx.fillRect(bx+20,by+12+i*14,bw*(0.25+i*0.05),3);
    ctx.fillRect(bx+20+bw*0.35,by+12+i*14,bw*(0.22+i*0.04),3);
    ctx.fillRect(bx+20+bw*0.65,by+12+i*14,bw*(0.15+i*0.03),3);
  }
  // 분필 받침대
  ctx.fillStyle='rgba(160,120,50,0.35)';
  ctx.fillRect(bx, by+bh, bw, 6);

  // ── 창문 (좌우 각 2개) ──
  [[CW*0.01,CH*0.22],[CW*0.01,CH*0.52],[CW*0.88,CH*0.22],[CW*0.88,CH*0.52]].forEach(([wx,wy])=>{
    const ww=CW*0.09, wh=TILE*3.0;
    // 창틀
    ctx.fillStyle='rgba(200,180,120,0.15)'; ctx.fillRect(wx,wy,ww,wh);
    ctx.strokeStyle='rgba(180,150,80,0.35)'; ctx.lineWidth=2; ctx.strokeRect(wx,wy,ww,wh);
    // 창살 (십자)
    ctx.strokeStyle='rgba(180,150,80,0.25)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
    // 창밖 하늘빛
    ctx.fillStyle='rgba(180,220,255,0.08)'; ctx.fillRect(wx+2,wy+2,ww/2-2,wh/2-2);
    ctx.fillStyle='rgba(180,220,255,0.05)'; ctx.fillRect(wx+ww/2+1,wy+2,ww/2-3,wh/2-2);
  });

  // ── 햇빛 기둥 ──
  for(let i=0;i<4;i++){
    const lx=CW*(0.04+i*0.025);
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx+TILE*2.5,CH);
    ctx.strokeStyle=`rgba(255,240,180,${0.03+Math.sin(ts*0.001+i)*0.012})`;
    ctx.lineWidth=TILE*0.7; ctx.stroke();
  }

  // ── 책상 (바닥에 여러 줄) — 연두색 + 소품 ──
  const deskRows = [
    {y:CH*0.26, cols:[0.18,0.32,0.46,0.60,0.74]},
    {y:CH*0.42, cols:[0.18,0.32,0.46,0.60,0.74]},
    {y:CH*0.58, cols:[0.18,0.32,0.46,0.60,0.74]},
    {y:CH*0.74, cols:[0.18,0.32,0.46,0.60,0.74]},
  ];
  deskRows.forEach(({y,cols},ri)=>{
    cols.forEach((xr,ci)=>{
      const dx=CW*xr, dy=y;
      const dw=TILE*1.7, dh=TILE*0.65;
      // 책상 상판 — 연두색
      ctx.fillStyle='rgba(100,200,80,0.30)'; ctx.fillRect(dx-dw/2,dy,dw,dh);
      ctx.strokeStyle='rgba(70,160,50,0.45)'; ctx.lineWidth=1.2; ctx.strokeRect(dx-dw/2,dy,dw,dh);
      // 다리
      ctx.fillStyle='rgba(60,120,40,0.28)';
      ctx.fillRect(dx-dw/2+2, dy+dh, 3, TILE*0.45);
      ctx.fillRect(dx+dw/2-5, dy+dh, 3, TILE*0.45);

      // 소품: 짝수칸 = 태블릿, 홀수칸 = 펼쳐진 책
      if ((ri+ci)%2===0) {
        // 태블릿
        const tx2=dx-dw*0.15, ty2=dy+dh*0.1, tw=dw*0.40, th2=dh*0.75;
        ctx.fillStyle='rgba(30,30,50,0.50)'; ctx.fillRect(tx2,ty2,tw,th2);
        ctx.strokeStyle='rgba(80,180,255,0.40)'; ctx.lineWidth=1; ctx.strokeRect(tx2,ty2,tw,th2);
        // 화면 빛
        ctx.fillStyle='rgba(100,200,255,0.18)'; ctx.fillRect(tx2+2,ty2+2,tw-4,th2-4);
      } else {
        // 펼쳐진 책 (두 페이지)
        const bx=dx-dw*0.20, by=dy+dh*0.12, bw=dw*0.45, bh=dh*0.70;
        // 왼쪽 페이지
        ctx.fillStyle='rgba(245,240,220,0.45)'; ctx.fillRect(bx,by,bw/2,bh);
        ctx.strokeStyle='rgba(180,160,100,0.35)'; ctx.lineWidth=0.8; ctx.strokeRect(bx,by,bw/2,bh);
        // 오른쪽 페이지
        ctx.fillStyle='rgba(240,235,215,0.45)'; ctx.fillRect(bx+bw/2,by,bw/2,bh);
        ctx.strokeStyle='rgba(180,160,100,0.35)'; ctx.lineWidth=0.8; ctx.strokeRect(bx+bw/2,by,bw/2,bh);
        // 책 줄
        ctx.fillStyle='rgba(100,80,40,0.20)';
        for(let l=0;l<3;l++) ctx.fillRect(bx+3,by+bh*0.2+l*bh*0.2,bw/2-6,1.5);
        // 가운데 접힘선
        ctx.strokeStyle='rgba(120,90,40,0.40)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(bx+bw/2,by); ctx.lineTo(bx+bw/2,by+bh); ctx.stroke();
      }
    });
  });

  // ── 교탁 (상단 중앙 아래) ──
  const podX=CW*0.47, podY=by+bh+TILE*0.8;
  ctx.fillStyle='rgba(140,95,40,0.35)'; ctx.fillRect(podX-TILE,podY,TILE*2,TILE*0.8);
  ctx.strokeStyle='rgba(100,65,20,0.35)'; ctx.lineWidth=1.5; ctx.strokeRect(podX-TILE,podY,TILE*2,TILE*0.8);

  // ── 시계 (오른쪽 상단 벽) ──
  const clkX=CW*0.92, clkY=TILE*1.5;
  ctx.beginPath(); ctx.arc(clkX,clkY,TILE*0.55,0,Math.PI*2);
  ctx.fillStyle='rgba(230,225,200,0.18)'; ctx.fill();
  ctx.strokeStyle='rgba(150,130,60,0.35)'; ctx.lineWidth=2; ctx.stroke();
  // 시침/분침
  const sec=ts*0.001;
  ctx.strokeStyle='rgba(50,40,20,0.50)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(clkX,clkY);
  ctx.lineTo(clkX+Math.cos(sec)*TILE*0.3, clkY+Math.sin(sec)*TILE*0.3); ctx.stroke();
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(clkX,clkY);
  ctx.lineTo(clkX+Math.cos(sec*12)*TILE*0.4, clkY+Math.sin(sec*12)*TILE*0.4); ctx.stroke();

  // ── 화분 (왼쪽 구석) ──
  const potX=CW*0.07, potY=CH*0.38;
  // 화분
  ctx.fillStyle='rgba(160,80,40,0.30)';
  ctx.beginPath(); ctx.moveTo(potX-TILE*0.4,potY+TILE*0.8);
  ctx.lineTo(potX+TILE*0.4,potY+TILE*0.8); ctx.lineTo(potX+TILE*0.3,potY+TILE*0.3);
  ctx.lineTo(potX-TILE*0.3,potY+TILE*0.3); ctx.closePath(); ctx.fill();
  // 식물
  ctx.strokeStyle='rgba(40,140,30,0.45)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(potX,potY+TILE*0.3);
  ctx.quadraticCurveTo(potX-TILE*0.5,potY-TILE*0.5,potX-TILE*0.3,potY-TILE*0.9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(potX,potY+TILE*0.3);
  ctx.quadraticCurveTo(potX+TILE*0.5,potY-TILE*0.3,potX+TILE*0.4,potY-TILE*0.8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(potX,potY+TILE*0.3);
  ctx.lineTo(potX,potY-TILE*1.0); ctx.stroke();
}

// ── 렌더러 ────────────────────────────────────────────────
function render(ts) {
  // 배경 (테마별)
  drawBg(ts);

  // 타일
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t  = stageGrid[r][c];
      const px = c * TILE, py = r * TILE;

      if (t === 1) drawWall(px, py);
      else if (t === 2) drawDot(px, py, false);
      else if (t === 3) drawDot(px, py, true, ts);
      else if (t === 4) drawObstacle(px, py, ts);
      else if (t === 5) drawBonusItem(px, py, ts);
    }
  }

  // 플레이어(팩맨)
  drawPacman(ts);
    drawGhosts();

  requestAnimationFrame(render);
}

function drawWall(px, py) {
  const p  = 1;
  const th = curTheme;
  // 벽 메인 색
  ctx.fillStyle = th.wallFill;
  ctx.fillRect(px + p, py + p, TILE - p*2, TILE - p*2);
  // 상단 하이라이트
  ctx.fillStyle = th.wallTop;
  ctx.fillRect(px + p, py + p, TILE - p*2, 3);
  // 하단 그림자
  ctx.fillStyle = th.wallBot;
  ctx.fillRect(px + p, py + TILE - p - 3, TILE - p*2, 3);
  // 테두리 라인
  ctx.strokeStyle = th.wallBorder;
  ctx.lineWidth = 0.5;
  ctx.strokeRect(px + p + 0.25, py + p + 0.25, TILE - p*2 - 0.5, TILE - p*2 - 0.5);
  // 테마별 벽 장식
  drawWallDecoration(px, py, th);
}

function drawWallDecoration(px, py, th) {
  const cx = px + TILE/2, cy = py + TILE/2;
  if (th === THEMES.space) {
    // 우주: 가끔 작은 행성/별 문양
    const seed = (px*31+py*17)%100;
    if (seed < 12) {
      ctx.beginPath(); ctx.arc(cx, cy, TILE*0.14, 0, Math.PI*2);
      ctx.fillStyle='rgba(160,100,255,0.2)'; ctx.fill();
    }
  } else if (th === THEMES.forest) {
    // 숲: 나뭇결 줄무늬
    ctx.fillStyle='rgba(0,80,10,0.12)';
    for(let i=0;i<3;i++) ctx.fillRect(px+1,py+1+i*4,TILE-2,1);
  } else if (th === THEMES.ocean) {
    // 바다: 산호 무늬
    const seed2 = (px*13+py*29)%100;
    if (seed2 < 18) {
      ctx.beginPath();
      ctx.moveTo(cx, cy+TILE*0.2);
      ctx.lineTo(cx-TILE*0.12, cy-TILE*0.1); ctx.lineTo(cx+TILE*0.12, cy-TILE*0.1);
      ctx.closePath();
      ctx.fillStyle='rgba(255,120,80,0.18)'; ctx.fill();
    }
  } else if (th === THEMES.classroom) {
    // 교실: 벽돌 경계선
    ctx.strokeStyle='rgba(80,50,10,0.2)'; ctx.lineWidth=0.5;
    ctx.strokeRect(px+2, py+2, TILE-4, TILE-4);
  }
}

function drawDot(px, py, big, ts) {
  const cx = px + TILE/2, cy = py + TILE/2;
  const th = curTheme;
  if (big) {
    // 퀴즈 펠릿 — 깜빡임 없음, 단순 원
    const r = TILE * 0.28;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = '#f5c842';
    ctx.shadowColor = '#f5c842'; ctx.shadowBlur = 12;
    ctx.fill(); ctx.shadowBlur = 0;
  } else {
    // 작은 점: 테마별 색상
    const r = Math.max(2, TILE * 0.09);
    if (th === THEMES.ocean) {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = th.dotColor; ctx.lineWidth = 1; ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fillStyle = th.dotColor; ctx.fill();
    }
  }
}



  function drawGhosts() {
    ghosts.forEach(g => {
      const cx = g.x * TILE + TILE/2;
      const cy = g.y * TILE + TILE/2;
      ctx.save();
      ctx.translate(cx, cy);
      const img = ghostImages[g.type];
      if (img && img.complete) {
        ctx.drawImage(img, -TILE*0.5, -TILE*0.5, TILE, TILE);
      } else {
        ctx.beginPath(); ctx.arc(0, 0, TILE*0.4, 0, Math.PI*2); ctx.fillStyle='red'; ctx.fill();
      }
      
      // Draw eyes looking at direction (0:R, 1:L, 2:U, 3:D)
      ctx.fillStyle = 'blue';
      const pupilOffset = TILE * 0.1;
      let px = 0, py = 0;
      if (g.dir === 0) px = pupilOffset;
      if (g.dir === 1) px = -pupilOffset;
      if (g.dir === 2) py = -pupilOffset;
      if (g.dir === 3) py = pupilOffset;
      
      ctx.fillRect(-TILE*0.2 + px, -TILE*0.1 + py, TILE*0.15, TILE*0.15);
      ctx.fillRect(TILE*0.05 + px, -TILE*0.1 + py, TILE*0.15, TILE*0.15);
      
      ctx.restore();
    });
  }

function drawPacman(ts) {
  if (ts < invincibilityEndTime && Math.floor(ts / 100) % 2 === 0) return; // Blink
  const cx = player.x * TILE + TILE/2;
  const cy = player.y * TILE + TILE/2;
  ctx.save();
  ctx.translate(cx, cy);
  // 원본 이미지가 왼쪽을 보고 있다고 가정하여 방향 반전
  if (pacDir === 0) ctx.scale(-1, 1); // Right (좌우 반전)
  // if (pacDir === 1) 아무것도 안 함 // Left
  if (pacDir === 2) ctx.rotate(Math.PI/2); // Up (반대 회전)
  if (pacDir === 3) ctx.rotate(-Math.PI/2); // Down (반대 회전)
  
  if (pacImage.complete) {
    ctx.drawImage(pacImage, -TILE*0.5, -TILE*0.5, TILE, TILE);
  } else {
    ctx.beginPath(); ctx.arc(0, 0, TILE*0.4, 0, Math.PI*2); ctx.fillStyle='yellow'; ctx.fill();
  }
  ctx.restore();
}


function drawObstacle(px, py, ts) {
  const cx = px + TILE/2, cy = py + TILE/2;
  // 작은 노란 점과 동일한 크기 (TILE * 0.09), 살짝 맥동
  const base = Math.max(2, TILE * 0.09);
  const r = base * (1 + Math.sin((ts||0) / 400) * 0.12);
  // 글로우
  ctx.beginPath(); ctx.arc(cx, cy, r * 2.2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(244,63,94,0.2)'; ctx.fill();
  // 몸체
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#f43f5e';
  ctx.shadowColor = 'rgba(244,63,94,0.8)'; ctx.shadowBlur = 6;
  ctx.fill(); ctx.shadowBlur = 0;
}

function drawBonusItem(px, py, ts) {
  const cx = px + TILE/2, cy = py + TILE/2;
  const item = bonusItems.find(b => b.col === Math.round(px/TILE) && b.row === Math.round(py/TILE));
  const isGreen = item ? item.color === 'green' : (((px+py)/TILE|0)%2===0);

  // 깜빡임 없음 — 고정 크기 (퀴즈 펠릿과 동일)
  const r = TILE * 0.28;

  const mainColor = isGreen ? '#22d36a' : '#38bdf8';
  const glowColor = isGreen ? 'rgba(34,211,106,0.4)' : 'rgba(56,189,248,0.4)';
  const darkColor = isGreen ? '#0a7a30' : '#075985';

  // 단순 원 (글로우만 유지)
  ctx.beginPath(); ctx.arc(cx, cy, r + 4, 0, Math.PI*2);
  ctx.fillStyle = isGreen ? 'rgba(34,211,106,0.15)' : 'rgba(56,189,248,0.15)';
  ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = mainColor;
  ctx.shadowColor = glowColor; ctx.shadowBlur = 10;
  ctx.fill(); ctx.shadowBlur = 0;
}

/* ═══════════════════════════════════════════════════
   이동
═══════════════════════════════════════════════════ */
function tileAt(c, r) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 1;
  return stageGrid[r][c];
}
function walkable(c, r) { const t = tileAt(c,r); return t !== 1; } 

function tryMove(dc, dr) {
  if (quizOpen || clearShown) return;
  const nc = player.x + dc, nr = player.y + dr;
  // 터널 (맵 밖으로 나가면 반대편으로)
  const wc = ((nc % COLS) + COLS) % COLS;
  const wr = ((nr % ROWS) + ROWS) % ROWS;
  if (!walkable(wc, wr)) return;

  if (dc > 0) pacDir = 0;
  else if (dc < 0) pacDir = 1;
  else if (dr < 0) pacDir = 2;
  else if (dr > 0) pacDir = 3;

  player.x = wc; player.y = wr;
  onStep();
}

function onStep() {
  const t = stageGrid[player.y][player.x];

  if (t === 2) {
    // 작은 점 먹기
    stageGrid[player.y][player.x] = 0;
    eatenDots++;
    player.score++;
    player.stageScore++;
    updateHUD();
    syncScore();
  } else if (t === 4) {
    // 빨간 원 통과: 1~5점 감점
    stageGrid[player.y][player.x] = 0; // 먹고 사라짐
    const penalty = 1 + Math.floor(Math.random() * 5); // 1~5점
    player.score      = Math.max(0, player.score - penalty);
    player.stageScore = Math.max(0, player.stageScore - penalty);
    updateHUD();
    showBadge(`💥 -${penalty}점!`);
    spawnPenaltyFloat(penalty);
  } else if (t === 5) {
    // 보너스 아이템
    stageGrid[player.y][player.x] = 0;
    const key  = `${player.x}-${player.y}`;
    const item = bonusItems.find(b => b.key === key);
    const pts  = item ? item.score : (1 + Math.floor(Math.random()*10));
    // 점수 하한 없음 — 음수도 그대로 반영
    player.score      += pts;
    player.stageScore += pts;
    const isPos = pts >= 0;
    showBadge(isPos ? '💎 +' + pts + '점!' : '💎 ' + pts + '점');
    spawnBonusFloat(pts);  // 화면에 즉시 표시
    updateHUD();
  } else if (t === 3) {
    // 퀴즈 파워펠릿
    const key = `${player.x}-${player.y}`;
    const node = quizNodes.find(n => n.key === key);
    if (node && !node.solved) {
      let qdata = quizDB[key];
      // quizDB에 없으면 재배분 시도
      if (!qdata) {
        console.warn('[Quiz] 키 없음, 재배분:', key, '/ 현재 quizDB 키:', Object.keys(quizDB));
        assignQuizzesToNodes();
        qdata = quizDB[key];
      }
      if (qdata) {
        showBadge(`❓ 퀴즈 등장!`);
        setTimeout(() => openQuiz(key, node, qdata), 250);
      } else {
        console.error('[Quiz] 재배분 후에도 데이터 없음:', key);
      }
    }
  }
  updateHUD();
}

/* ═══════════════════════════════════════════════════
   점수 배율: 시도 횟수에 따라
   1회 도전(attempts=0): 10~20점
   2회 도전(attempts=1): 5~15점
   3회 도전(attempts=2): 1~10점
   4회 이상(attempts≥3): 1점 고정
═══════════════════════════════════════════════════ */
function calcQuizPoints(attempts) {
  if (attempts === 0) { const lo=10, hi=20; return lo + Math.floor(Math.random()*(hi-lo+1)); }
  if (attempts === 1) { const lo=5,  hi=15; return lo + Math.floor(Math.random()*(hi-lo+1)); }
  if (attempts === 2) { const lo=1,  hi=10; return lo + Math.floor(Math.random()*(hi-lo+1)); }
  return 1; // 4회 이상
}

/* ═══════════════════════════════════════════════════
   퀴즈 팝업

function openQuiz(key, node, qdata) {
  curQuizKey  = key;
  curQuizNode = node;
  curQuizData = qdata;
  quizOpen    = true;

  // 이전에 제시된 점수 있으면 1점 낮게, 최소 1점
  let pts;
  if (node.lastPts !== null && node.lastPts !== undefined) {
    pts = Math.max(1, node.lastPts - 1);
  } else {
    pts = calcQuizPoints(node.attempts);
  }
  node.lastPts = pts; // 이번 제시 점수 저장
  // 배점 및 문제 세팅
  document.getElementById('qz-pts').textContent = `+${pts}점 (10~20점 랜덤)`;
  document.getElementById('qz-q').textContent = qdata.question;
  document.getElementById('qz-res').innerHTML = '';

  // 이미지 처리: 문제 아래에 표시하고, 이미지가 없으면 영역 자체를 숨김
  renderQuizImage(qdata);

  document.getElementById('qz-save').textContent  = '';
  document.getElementById('qz-save').className    = 'save-s';
  document.getElementById('qz-cont').textContent  = '계속하기 (ESC)';

  // 시도 횟수 표시
  const atEl = document.getElementById('qz-attempt');
  atEl.textContent = node.attempts > 0 ? `(${node.attempts}번 시도)` : '';

  renderAnswerArea(qdata, pts);
  document.getElementById('qz-ov').classList.add('open');
}

function renderAnswerArea(qdata, pts) {
  const area = document.getElementById('qz-area');
  area.innerHTML = '';
  if      (qdata.type === 'choice') renderChoice(area, qdata, pts);

}

/* 선택형 - 선택지 랜덤 배치 */
function renderChoice(area, qdata, pts) {
  const grid = document.createElement('div'); grid.className = 'opts';

  // ── 선택지 정리: undefined·빈값 제거 ─────────────────
  const rawOpts = (qdata.options || [])
    .map(o => (o !== undefined && o !== null && String(o).trim() !== '') ? String(o).trim() : null)
    .filter(o => o !== null);

  // 번호 배지: 선택지 수에 맞게 동적 생성
  const makeNum = i => String(i + 1).padStart(2, '0');

  // 정답 텍스트: answer가 그대로 텍스트 (시트 D열 값)
  // answer가 배열(복수정답)이면 options와 텍스트 비교로 정답 찾기
  const correctText = Array.isArray(qdata.answer)
    ? qdata.answer.map(a=>a.replace(/\s/g,'')).join(',')
    : String(qdata.answer).replace(/\s/g,'');

  // 셔플 (Fisher-Yates)
  const shuffled = [...rawOpts];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  shuffled.forEach((opt, i) => {
    const btn = document.createElement('button'); btn.className = 'opt';
    btn.innerHTML = `<span class="onum">${makeNum(i)}</span><span>${opt}</span>`;
    btn.onclick = () => {
      grid.querySelectorAll('.opt').forEach(b => { b.onclick=null; b.disabled=true; });
      // 정답 판별: 선택지 텍스트로 비교 (셔플 후에도 정확)
      const optNorm = opt.replace(/\s/g,'');
      const ok = Array.isArray(qdata.answer)
        ? qdata.answer.map(a=>a.replace(/\s/g,'')).includes(optNorm)
        : (optNorm === correctText);
      btn.classList.add(ok ? 'ok' : 'ng');
      showResult(ok, ok ? pts : 0, opt);
      if (ok) finishQuiz(pts, opt);
      else  { logAnswer(false, opt, 0); startWrongTimer(); }
    };
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

/* 단답형 */
function renderShort(area, qdata, pts) {
  const wrap = document.createElement('div'); wrap.className = 'si-wrap';
  const inp = document.createElement('input'); inp.type='text'; inp.className='si-inp';
  inp.placeholder=''; inp.maxLength=40;
  const btn = document.createElement('button'); btn.className='btn-sub'; btn.textContent='제출';
  const submit = () => {
    const v = inp.value.trim(); if (!v) { inp.focus(); return; }
    inp.disabled=true; btn.disabled=true;
    // 복수 정답: answer에 , 구분 시 배열로 처리
    const rawAns2 = Array.isArray(qdata.answer) ? qdata.answer : String(qdata.answer).split(',');
    const ans2 = rawAns2.map(a=>norm(a)).filter(Boolean);
    const ok = ans2.length > 0 && ans2.some(a => a === norm(v));
    showResult(ok, ok ? pts : 0, v);
    if (ok) finishQuiz(pts, v);
    else  { logAnswer(false, v, 0); startWrongTimer(); }
  };
  btn.onclick=submit; inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  wrap.appendChild(inp); wrap.appendChild(btn); area.appendChild(wrap);
  setTimeout(()=>inp.focus(),100);
}
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,'');}


// 구글 드라이브 공유 URL을 직접 이미지 URL로 변환
function toDirectImageUrl(url) {
  var base = 'https:' + '//drive.google.com/uc?export=view&id=';
  var m1 = url.match(new RegExp('/d/([a-zA-Z0-9_-]+)'));
  if (m1) return base + m1[1];
  var m2 = url.match(new RegExp('[?&]id=([a-zA-Z0-9_-]+)'));
  if (m2) return base + m2[1];
  return url;
}


// 구글 드라이브 공유 URL을 직접 이미지 URL로 변환
function toDirectImageUrl(url) {
  const raw = String(url || '').trim();
  if (!raw) return '';
  const base = 'https:' + '//drive.google.com/uc?export=view&id=';
  let m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return base + m[1];
  m = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return base + m[1];
  return raw;
}

function getDriveFileId(value) {
  const raw = String(value || '').trim();
  let m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  m = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  m = raw.match(/(?:^|[^a-zA-Z0-9_-])([a-zA-Z0-9_-]{25,})(?:[^a-zA-Z0-9_-]|$)/);
  if (m) return m[1];
  return '';
}

// 문제 이미지 표시: Drive 이미지는 서버 data URL을 먼저 사용해서 안정적으로 표시
async function renderQuizImage(qdata) {
  const imgWrap = document.getElementById('qz-img');
  imgWrap.innerHTML = '';
  imgWrap.style.display = 'none';

  const rawUrl = String((qdata && qdata.image) || '').trim();
  const fileId = String((qdata && qdata.imageFileId) || getDriveFileId(rawUrl) || '').trim();
  if (!rawUrl && !fileId) return;

  const showSrc = (src) => new Promise((resolve, reject) => {
    const img = new Image();
    img.alt = '문제 이미지';
    img.onload = () => {
      imgWrap.innerHTML = '';
      imgWrap.appendChild(img);
      imgWrap.style.display = 'block';
      resolve(true);
    };
    img.onerror = () => reject(new Error('image load failed'));
    img.src = src;
  });

  // Drive 링크는 직접 <img>보다 Apps Script 서버 변환이 훨씬 안정적입니다.
  if (fileId) {
    try {
      const res = await callServer('getImageDataUrl', { fileId });
      if (res && res.ok && res.dataUrl) {
        await showSrc(res.dataUrl);
        return;
      }
      console.warn('[Image] DriveApp 변환 실패:', res && res.error ? res.error : res);
    } catch (err) {
      console.warn('[Image] DriveApp 호출 실패:', err);
    }
  }

  // 일반 이미지 URL 또는 DriveApp 실패 시 직접 URL로 마지막 시도
  try {
    await showSrc(toDirectImageUrl(rawUrl));
  } catch (err) {
    console.warn('[Image] 직접 이미지 로딩 실패:', err);
    imgWrap.innerHTML = '';
    imgWrap.style.display = 'none';
  }
}

function startWrongTimer() {

  cd.textContent = `❌ ${countdown}초 후 닫힘`;
  clearInterval(wrongTimerRef);

      clearInterval(wrongTimerRef);
      closeQuiz();
    } else {

  }, 1000);

function finishQuiz(pts, ansStr) {
  if (!curQuizNode) return;
  // 퀴즈 완료 처리
  curQuizNode.solved = true;
  stageGrid[curQuizNode.row][curQuizNode.col] = 0; // 파워펠릿 제거
  quizSolved++;
  player.score      += pts;
  player.stageScore += pts;
  updateHUD();
  showBadge(`🎯 +${pts}점!`);
  document.getElementById('qz-cont').textContent = '🎉 계속하기!';
  logAnswer(true, ansStr, pts);

  // 정답: 2초 후 자동 닫기
  let countdown = 2;
  const cd = document.getElementById('qz-cont');
  cd.textContent = `🎉 ${countdown}초 후 자동 닫힘`;
  const cdTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(cdTimer);
      closeQuiz();
    } else {
      cd.textContent = `🎉 ${countdown}초 후 자동 닫힘`;
    }
  }, 1000);

  // 스테이지 클리어 체크
  checkStageClear();
}

  document.getElementById('clear-ov').classList.add('show');

  // 서버에 저장 (서버가 최고점 비교 후 유지)
  callServer('saveStageScore', {
    ban       : player.ban,
    num       : player.num,

    stageName : player.sheet,

/* ═══════════════════════════════════════════════════
   게임 루프
═══════════════════════════════════════════════════ */
function inputLoop(ts) {
  if (gameActive && !quizOpen && !clearShown) {
    if (ts - lastMove > MOVE_MS) {
      let moved = false;
      if      (keys.has('ArrowUp')   ||keys.has('w')||keys.has('W')) { tryMove(0,-1); moved=true; }
      else if (keys.has('ArrowDown') ||keys.has('s')||keys.has('S')) { tryMove(0, 1); moved=true; }
      else if (keys.has('ArrowLeft') ||keys.has('a')||keys.has('A')) { tryMove(-1,0); moved=true; }
      else if (keys.has('ArrowRight')||keys.has('d')||keys.has('D')) { tryMove(1, 0); moved=true; }
      if (moved) lastMove = ts;
    }
  }
  
  if (ts - lastGhostMove > GHOST_MOVE_MS) {
    ghosts.forEach(g => {
      // 0:R, 1:L, 2:U, 3:D
      const dirs = [{dx:1,dy:0}, {dx:-1,dy:0}, {dx:0,dy:-1}, {dx:0,dy:1}];
      let possibleDirs = [];
      for(let i=0; i<4; i++){
        // Don't reverse immediately unless necessary
        if((g.dir===0 && i===1) || (g.dir===1 && i===0) || (g.dir===2 && i===3) || (g.dir===3 && i===2)) continue;
        const nx = ((g.x + dirs[i].dx)%COLS + COLS)%COLS;
        const ny = ((g.y + dirs[i].dy)%ROWS + ROWS)%ROWS;
        if(walkable(nx, ny)) possibleDirs.push(i);
      }
      if(possibleDirs.length === 0) {
        // Must reverse
        g.dir = g.dir===0?1 : g.dir===1?0 : g.dir===2?3 : 2;
      } else {
        // Pick random valid direction
        g.dir = possibleDirs[Math.floor(Math.random() * possibleDirs.length)];
      }
      g.x = ((g.x + dirs[g.dir].dx)%COLS + COLS)%COLS;
      g.y = ((g.y + dirs[g.dir].dy)%ROWS + ROWS)%ROWS;
    });
    lastGhostMove = ts;
  }
  
  // Collision
  ghosts.forEach(g => {
    if(g.x === player.x && g.y === player.y && ts > invincibilityEndTime) {
      player.score = Math.max(0, player.score - 1);
      invincibilityEndTime = ts + 1500; document.getElementById('hv-score').textContent = player.score;
      
      // Bounce (reverse directions)
      g.dir = g.dir===0?1 : g.dir===1?0 : g.dir===2?3 : 2;
      g.x = ((g.x + (g.dir===0?1 : g.dir===1?-1 : 0))%COLS + COLS)%COLS;
      g.y = ((g.y + (g.dir===3?1 : g.dir===2?-1 : 0))%ROWS + ROWS)%ROWS;
      
      // Player bounce
      const playerOppDir = pacDir===0?1 : pacDir===1?0 : pacDir===2?3 : 2;
      const nx = ((player.x + (playerOppDir===0?1 : playerOppDir===1?-1 : 0))%COLS + COLS)%COLS;
      const ny = ((player.y + (playerOppDir===3?1 : playerOppDir===2?-1 : 0))%ROWS + ROWS)%ROWS;
      if(walkable(nx, ny)) {
        player.x = nx; player.y = ny;
      }
    }
  });

    requestAnimationFrame(inputLoop);
}

function handleLogin() {
  const ban   = parseInt(document.getElementById('inp-ban').value) || 0;
  const num   = parseInt(document.getElementById('inp-num').value) || 0;
  const name  = document.getElementById('inp-name').value.trim();
  const sheet = document.getElementById('sel-sheet').value;
  const err   = document.getElementById('l-err');
  const info  = document.getElementById('l-info');
  const btn   = document.getElementById('btn-login');

  if (!ban || ban < 1) { err.textContent='반을 입력해 주세요.'; return; }
  if (!num || num < 1) { err.textContent='번호를 입력해 주세요.'; return; }
  if (!name)           { err.textContent='이름을 입력해 주세요.'; return; }
  if (!sheet)          { err.textContent='문제 세트를 선택해 주세요.'; return; }
  err.textContent='';
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 접속 중...';

  callServer('loginOrRegister', { ban, num, name })
    .then(data=>{
      if (!data.ok) throw new Error(data.error||'서버 오류');
      player.ban         = ban;
      player.num         = num;
      player.name        = data.name || name;
      player.sheet       = sheet;
      player.score       = Number(data.score) || 0; // 학생 시트의 누적 점수 표시
      player.stageScores = data.stageScores || {};
      if (!data.isNew) {
        renderHistoryCard(data);
        info.textContent = `🎮 ${data.name}님, 반갑습니다!`;
      } else {
        document.getElementById('history-card').style.display = 'none';
        info.textContent = `✨ 환영합니다, ${data.name}님!`;
      }
      return callServer('getQuizBank', { sheetName: sheet });
    })
    .then(qb=>{
      quizDB = {};
      quizPool = [];
      if (!(qb && qb.ok && qb.quizzes && qb.quizzes.length > 0)) {
        throw new Error((qb && qb.error) || '문제를 불러오지 못했습니다. 문제 시트를 확인해 주세요.');
      }
      quizPool = qb.quizzes;
      console.log('[QuizBank] 로드 완료:', quizPool.length, '문제');
      launchGame(sheet);
    })
    .catch(err2=>{
      console.warn('[login/game start 실패]', err2);
      info.textContent = '';
      info.style.color = 'var(--teal)';
      err.textContent = err2.message || '로그인 또는 문제 불러오기에 실패했습니다.';
      showScr('scr-login');
    })
    .finally(()=>{ btn.disabled=false; btn.innerHTML='게임 시작 ▶'; });
}

function launchGame(sheet) {
  player.sheet = sheet;

  if (selectedMap === 'random') {

}

function assignQuizzesToNodes() {
  // 항상 quizPool(서버 원본)에서만 가져옴 — quizDB와 혼합하지 않음
  const pool = quizPool.length > 0 ? quizPool : [];
  if (pool.length === 0) { console.warn('[Quiz] 문제 없음'); return; }

  // quizDB 초기화 (이전 배분 데이터 완전히 제거)
  quizDB = {};

  // pool 셔플
  const shuffled = [...pool].sort(() => Math.random() - 0.5);

  // 각 퀴즈 노드에 1:1 배분 (pool보다 노드가 많으면 순환)
  quizNodes.forEach((node, i) => {
    quizDB[node.key] = { ...shuffled[i % shuffled.length] };
  });

  console.log('[QuizAssign] 노드:', quizNodes.length, '/ 풀:', pool.length);
}

<script>
  // ==========================================
  // React (Supabase) Integration 
  // ==========================================
  
  // Hide login screen
  document.getElementById('scr-login').style.display = 'none';

  window.addEventListener('resize', () => { if(typeof curMapIdx !== "undefined") { calcLayout(curMapIdx); resizeCanvas(); } });
  window.addEventListener('message', (event) => {
    const data = event.data;
    if (data.source !== 'react') return;

    if (data.type === 'INIT_GAME') {
      quizPool = data.quizPool;
      Object.assign(player, data.player);
      player.stageScores = player.stageScores || {};
      
      // Start game directly without login
      initStage(Math.floor(Math.random() * MAPS.length), true);
      showScr('scr-game');
      requestAnimationFrame(render);
      requestAnimationFrame(inputLoop);
      gc.focus();
    } else if (data.type === 'SCORE_SAVED') {
      if (data.payload && data.payload.score !== undefined) {
        player.score = data.payload.score;
        if (data.payload.stageScores) player.stageScores = data.payload.stageScores;
        updateHUD();
      }
    }
  });

  // Override callServer to postMessage instead of google.script.run
  callServer = function(funcName, params = {}) {
    return new Promise((resolve, reject) => {
      if (funcName === 'saveStageScore') {
        window.parent.postMessage({ type: 'SAVE_SCORE', payload: params, source: 'pacman' }, '*');
        resolve({});
      } else if (funcName === 'submitAnswer') {
        window.parent.postMessage({ type: 'SUBMIT_ANSWER', payload: params, source: 'pacman' }, '*');
        resolve({});
      } else {
        resolve({});
      }
    });
  }

  // Override the "처음으로" and "나가기" buttons to notify React
  document.getElementById('btn-next').onclick = () => {
    window.parent.postMessage({ type: 'EXIT', source: 'pacman' }, '*');
  };
  document.getElementById('btn-out').onclick = () => {
    window.parent.postMessage({ type: 'EXIT', source: 'pacman' }, '*');
  };

  // Notify React that iframe is ready
  window.parent.postMessage({ type: 'READY', source: 'pacman' }, '*');
</script>
</body>
</html>
